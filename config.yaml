slurm:
  partition: u22
  gres: gpu:1
  cpus: 8
  mem: 48G
  time: "12:00:00"

vllm:
  hf_model: Qwen/Qwen2.5-14B-Instruct
  served_name: Qwen2.5-14B-Instruct
  port: 8000
  max_model_len: 8192
  gpu_memory_utilization: 0.9
  enable_prefix_caching: false
  extra_args: "--no-enable-prefix-caching"

# dev/quick run (not the paper workload)
run:
  base_url: http://localhost:8000/v1
  concurrency: 16
  seed: 67
  results_dir: results
  load_mode: concurrent
  rate_rps: 4.0
  siso: {n: 20, max_tokens: [256, 1024], temperature: [0.5, 1.0]}
  silo: {n: 20, max_tokens: [2048, 4096], temperature: [0.1, 0.4]}

# paper workload: 725 req, 32 rps poisson, seed 67
.workload: &workload
  load_mode: poisson
  rate_rps: 32.0
  concurrency: 128
  seed: 67
  siso: {n: 300, max_tokens: [128, 512],   temperature: [0.5, 1.0]}
  silo: {n: 75,  max_tokens: [2048, 3072], temperature: [0.1, 0.4]}
  liso: {n: 200, max_tokens: [64, 256]}
  lilo: {n: 150, max_tokens: [1024, 2048]}

experiments:
  baseline:
    run:
      <<: *workload

  prefix_on_default:
    vllm:
      enable_prefix_caching: true
      extra_args: ""
    run:
      <<: *workload

  chunked_prefill:
    vllm:
      extra_args: "--no-enable-prefix-caching --enable-chunked-prefill --max-num-batched-tokens 2048"
    run:
      <<: *workload

  awq:
    vllm:
      hf_model: Qwen/Qwen2.5-14B-Instruct-AWQ
      served_name: Qwen2.5-14B-Instruct-AWQ
      extra_args: "--no-enable-prefix-caching --quantization awq"
    run:
      <<: *workload

  stack:
    vllm:
      hf_model: Qwen/Qwen2.5-14B-Instruct-AWQ
      served_name: Qwen2.5-14B-Instruct-AWQ
      extra_args: "--no-enable-prefix-caching --quantization awq --enable-chunked-prefill --max-num-batched-tokens 2048"
    run:
      <<: *workload

  admission_control:
    vllm:
      extra_args: "--no-enable-prefix-caching --max-num-seqs 32"
    run:
      <<: *workload

  prefix_cache_chunked:
    vllm:
      enable_prefix_caching: true
      extra_args: "--enable-chunked-prefill --max-num-batched-tokens 2048"
    run:
      <<: *workload
